sonar.projectKey=comori-fe
sonar.projectName=Comori FE

sonar.sources=src
sonar.tests=src

sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

sonar.exclusions=**/node_modules/**,**/coverage/**

sonar.coverage.exclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,src/setupTests.js,src/main.jsx
